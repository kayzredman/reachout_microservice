<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44" fill="none">
  <!-- Telecel official: red bg, white 't' in circle -->
  <rect width="44" height="44" rx="10" fill="#E60012"/>
  <!-- White circle with 't' -->
  <circle cx="22" cy="20" r="10" fill="none" stroke="white" stroke-width="2"/>
  <text x="22" y="25" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">t</text>
  <!-- telecel text -->
  <text x="22" y="39" font-family="Arial, Helvetica, sans-serif" font-size="7" font-weight="600" fill="white" text-anchor="middle" letter-spacing="1">telecel</text>
</svg>