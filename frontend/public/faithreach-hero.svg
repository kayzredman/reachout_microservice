<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b21b6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6d28d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1bb8d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:0.85" />
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1100" cy="530" r="250" fill="rgba(255,255,255,0.04)"/>
  <circle cx="900" cy="100" r="150" fill="rgba(255,255,255,0.03)"/>
  <circle cx="600" cy="315" r="320" fill="rgba(255,255,255,0.02)"/>
  <!-- Cross icon -->
  <rect x="565" y="120" width="70" height="180" rx="12" fill="url(#cross)"/>
  <rect x="510" y="165" width="180" height="70" rx="12" fill="url(#cross)"/>
  <!-- Main text -->
  <text x="600" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">FaithReach</text>
  <!-- Tagline -->
  <text x="600" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="rgba(255,255,255,0.85)" text-anchor="middle">Empowering Churches to Connect &amp; Grow</text>
  <!-- Subtle bottom bar -->
  <rect x="450" y="470" width="300" height="4" rx="2" fill="url(#bar)" opacity="0.8"/>
  <!-- Platform icons hint -->
  <text x="600" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle">Social Media Management for Faith Communities</text>
</svg>